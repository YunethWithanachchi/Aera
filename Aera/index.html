<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aera</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>

</head>
<body style="background-color:#EFBBCF;">
  <h1 style="color:#8675A9">Aera❤️</h1>
  <main>
    <section class="container">
      <div id="status"></div>
      <div id="Chat-Box"></div>
      <div id="stickers"><div class="boxHeader">Stickers</div></div>
      <div id="Emojis"><div class="boxHeader">Emojis</div><emoji-picker></emoji-picker></div>
      <div id="images"
      ><div class="boxHeader">Images</div>
        <button id="uploadBtn">
          <img id= "upload" src="./assets/uploadIcon.png" alt="upload image" width="50vw" height="50vw">
        </button>
<!--
        <input type="file"  id="imageInput" accept="image/*" style="display: none">
-->
      </div>
      <div id="prompt-Area" >
        <button id="skipBtn">Skip</button>
        <div id="Typing-Region" contenteditable="true"></div>
        <button id="send">Send</button>
      </div>
    </section>
  </main>
  <script type="module" src="./js/common/cloudinary.js"></script>
  <script type="module" src="./js/loader.js"></script>
  <script type="module" src="./js/common/EmojiConfig.js"></script>
</body>
</html>
